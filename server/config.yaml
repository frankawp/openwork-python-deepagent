          mkdir, mkdirat, rmdir, unlink, unlinkat, rename, renameat, renameat2,
          symlink, symlinkat, link, linkat,
          truncate, ftruncate, fsync, fdatasync,
          chmod, fchmod, fchmodat, chown, fchown, fchownat,
          mmap, mprotect, munmap, brk, madvise,
          rt_sigaction, rt_sigprocmask, rt_sigreturn, sigaltstack,
          futex, clock_gettime, clock_nanosleep, gettimeofday, nanosleep, sched_yield,
          getpid, gettid, getuid, geteuid, getgid, getegid, getppid, getpgrp, getcwd, uname,
          arch_prctl, set_tid_address, set_robust_list, prlimit64, getrlimit, setrlimit, getrandom, rseq,
