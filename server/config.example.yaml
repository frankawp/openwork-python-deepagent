database:
  url: "mysql+pymysql://user:pass@host:3306/openwork"
auth:
  jwt_secret: "CHANGE_ME"
  access_ttl_min: 60
  refresh_ttl_days: 7
workspace:
  root: "/var/lib/openwork/workspaces"
data:
  dir: "/var/lib/openwork"
admin:
  email: "admin@example.com"
  password: "admin123"
sandbox:
  # Backend is Daytona only.
  # Required env vars:
  #   DAYTONA_API_KEY
  #   DAYTONA_API_URL
  #   DAYTONA_TARGET
  enabled: true
  time_limit_sec: 120
  max_output_bytes: 100000
  daytona_lifecycle:
    # 0 = disable auto-stop
    auto_stop_interval_min: 0
    # 0 = disable auto-archive
    auto_archive_interval_days: 0
    # -1 = disable auto-delete, 0 = delete immediately after stop
    auto_delete_interval_days: -1
